version: '3.4'

services:
  hope-tracker-back:
    image: ${DOCKER_REGISTRY-}hopetrackerback
    build:
      context: .
      dockerfile: Hope-tracKeR-back/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=docker;Username=admin;Password=admin;

  db:
    image: postgres:13.3
    container_name: hope-tracker-db
    environment:
      POSTGRES_DB: "docker"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: